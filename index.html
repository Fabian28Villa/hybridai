<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HybridAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&family=Source+Serif+4:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --bg:#100D0A;
    --surface:#1B1611;
    --surface-2:#251E16;
    --line:#3A2F22;
    --text:#F6EEE3;
    --muted:#A2907E;
    --accent:#F4A340;
    --accent2:#E8553D;
    --accent3:#2BB3A3;
    --accent4:#B98BD6;
    --danger:#E8553D;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --font-serif:'Source Serif 4', serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
  h1,h2,h3{font-family:var(--font-display);margin:0;}
  .app{max-width:960px;margin:0 auto;padding:20px 16px 100px;}
  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;color:#100D0A;font-size:15px;}
  .brand h1{font-size:20px;letter-spacing:0.5px;}
  .brand p{margin:0;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  .level-chip{font-family:var(--font-mono);font-size:12px;background:var(--surface);border:1px solid var(--line);padding:6px 10px;border-radius:20px;color:var(--accent);}
  .header-actions{display:flex;gap:8px;align-items:center;}

  nav.tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:20px;padding-bottom:0;}
  nav.tabs button{background:none;border:none;color:var(--muted);font-family:var(--font-body);font-weight:600;font-size:13px;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
  nav.tabs button.active{color:var(--text);border-bottom:2px solid var(--accent);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}}

  .score-wrap{display:flex;align-items:center;gap:18px;}
  .score-num{font-family:var(--font-mono);font-size:44px;font-weight:600;color:var(--accent);}
  .score-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;}

  .quote-card{background:linear-gradient(135deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;position:relative;}
  .quote-card .q{font-family:var(--font-serif);font-style:italic;font-size:17px;line-height:1.5;color:var(--text);}
  .quote-card .src{margin-top:8px;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;}
  .gps-map{height:260px;border-radius:12px;overflow:hidden;margin-top:12px;background:var(--surface-2);}
  .mini-map{height:180px;margin-top:10px;}
  .leaflet-control-attribution{font-size:9px !important;}

  .bar-row{margin-bottom:14px;}
  .bar-row .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .bar-row .top .name{color:var(--text);font-weight:600;}
  .bar-row .top .vals{font-family:var(--font-mono);color:var(--muted);}
  .bar-track{height:8px;background:var(--surface-2);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width .3s;}

  input,select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:9px 10px;border-radius:8px;font-family:var(--font-body);font-size:13px;}
  input[type=color]{padding:3px;height:38px;cursor:pointer;}
  label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;margin-top:10px;}
  button.primary{background:var(--accent);color:#100D0A;border:none;font-weight:700;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:14px;}
  button.ghost{background:none;border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;}
  button.danger{background:none;border:1px solid var(--danger);color:var(--danger);padding:5px 9px;border-radius:6px;cursor:pointer;font-size:11px;}
  button.icon-btn{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;padding:6px 4px;border-bottom:1px solid var(--line);}
  td{padding:8px 4px;border-bottom:1px solid var(--line);}

  .pill{display:inline-block;font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:20px;background:var(--surface-2);color:var(--muted);}
  .conf-alta{color:var(--accent3);} .conf-media{color:var(--accent);} .conf-baja{color:var(--danger);}
  .event-card{border-left:3px solid var(--accent3);background:var(--surface-2);border-radius:10px;padding:12px;margin-bottom:10px;}
  .event-card.priority-high{border-left-color:var(--accent2);}
  .swatch-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .swatch{width:60px;height:60px;border-radius:10px;border:2px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;text-align:center;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:20px 0;}
  .note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;}
  canvas{width:100%;max-width:100%;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;}
  .mic-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#100D0A;border:none;font-size:22px;box-shadow:0 4px 14px rgba(0,0,0,0.4);cursor:pointer;z-index:50;}
  .mic-fab.listening{animation:pulse 1s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(244,163,64,0.6);}70%{box-shadow:0 0 0 14px rgba(244,163,64,0);}100%{box-shadow:0 0 0 0 rgba(244,163,64,0);}}
  .voice-toast{position:fixed;bottom:86px;right:20px;background:var(--surface);border:1px solid var(--line);padding:10px 14px;border-radius:10px;font-size:12px;max-width:220px;z-index:50;}
  .thumb{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:10px;}
  .cam-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .cam-row label.filebtn{display:inline-flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:9px 14px;border-radius:8px;cursor:pointer;font-size:12px;width:auto;}
  .cam-row input[type=file]{display:none;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<button class="mic-fab" id="micFab" title="Comando de voz">🎤</button>

<script>
const todayStr = () => new Date().toISOString().slice(0,10);
const fmt1 = n => Math.round(n*10)/10;

// If this file is hosted outside Claude.ai (e.g. GitHub Pages), the direct Anthropic call
// below has no way to authenticate. Set this to your own Cloudflare Worker URL (see
// worker.js) to make "Analizar con IA" work for anyone who opens the public link.
// Leave empty to only use the built-in path (works while chatting with Claude directly).
const AI_PROXY_URL = "";

const PRESETS = {
  ember: {name:'Ember', bg:'#100D0A', surface:'#1B1611', accent:'#F4A340', accent2:'#E8553D', accent3:'#2BB3A3', accent4:'#B98BD6'},
  aurora:{name:'Aurora', bg:'#0B0C16', surface:'#151726', accent:'#9D7BFF', accent2:'#FF5D9E', accent3:'#4FD1FF', accent4:'#7BFFB0'},
  mono:  {name:'Mono Lime', bg:'#0D0F12', surface:'#161A1F', accent:'#C8FF3D', accent2:'#FF6A3D', accent3:'#35D6C0', accent4:'#9D7BFF'},
  ocean: {name:'Ocean', bg:'#081016', surface:'#0F1B24', accent:'#39C6E0', accent2:'#F2A65A', accent3:'#4FE0A0', accent4:'#6E8EFF'},
};

const QUOTES = [
  {t:'"Todo lo puedo en Cristo que me fortalece."', s:'Filipenses 4:13'},
  {t:'"Esfuérzate y sé valiente; no temas ni desmayes."', s:'Josué 1:9'},
  {t:'"Los que esperan en Jehová tendrán nuevas fuerzas; levantarán alas como las águilas."', s:'Isaías 40:31'},
  {t:'"El Señor es mi fuerza y mi escudo; en él confía mi corazón, y fui ayudado."', s:'Salmos 28:7'},
  {t:'"Todo lo que hagáis, hacedlo de corazón, como para el Señor."', s:'Colosenses 3:23'},
  {t:'No cuentes los días, haz que los días cuenten.', s:'Frase motivacional'},
  {t:'La disciplina es elegir entre lo que quieres ahora y lo que quieres más.', s:'Frase motivacional'},
  {t:'El cuerpo logra lo que la mente cree posible.', s:'Frase motivacional'},
  {t:'No se trata de tener tiempo, se trata de hacer tiempo.', s:'Frase motivacional'},
  {t:'Cada entrenamiento es un depósito en tu mejor versión futura.', s:'Frase motivacional'},
  {t:'"Porque de tal manera amó Dios al mundo..." Descansa hoy sabiendo que ya eres suficiente.', s:'Juan 3:16 (parafraseado)'},
  {t:'El dolor de hoy es la fuerza de mañana.', s:'Frase motivacional'},
  {t:'"Encomienda a Jehová tu camino, y confía en él; y él hará."', s:'Salmos 37:5'},
  {t:'La constancia vence al talento cuando el talento no es constante.', s:'Frase motivacional'},
  {t:'"Panza llena, corazón contento" no aplica hoy: hoy toca disciplina, mañana toca cosecha.', s:'Frase motivacional'},
  {t:'"Mas los que esperan a Jehová tendrán nuevas fuerzas."', s:'Isaías 40:31'},
  {t:'Un pequeño progreso cada día se convierte en grandes resultados.', s:'Frase motivacional'},
  {t:'"Fiel es el que os llama, el cual también lo hará."', s:'1 Tesalonicenses 5:24'},
];

const DEFAULT_TARGETS = {calories:2200,protein:120,carbs:250,fat:70,sodium:3000,sugar:50,water:2500};

let STATE = {
  profile: null,
  events: [],
  logsByDate: {},
  gamification: {xp:0},
  customTargets: null,
  theme: PRESETS.ember,
  settings: {showQuotes:true},
  tab: 'dashboard',
  loaded: false,
  photoDraft: null,
};

// Uses window.storage when running inside a Claude.ai artifact (data tied to your Claude account).
// Falls back to localStorage when this file is hosted on its own (e.g. GitHub Pages) so it still
// saves data on that device/browser. These two storage locations are separate and do not sync.
const hasWidgetStorage = !!(window.storage && window.storage.get);

async function safeGet(key){
  if(hasWidgetStorage){
    try{ const r = await window.storage.get(key); return r ? r.value : null; }
    catch(e){ return null; }
  }
  try{ return localStorage.getItem('hybridai:'+key); }
  catch(e){ return null; }
}
async function safeSet(key,val){
  let str;
  try{ str = typeof val==='string'?val:JSON.stringify(val); }
  catch(e){ console.error('serialize error',e); return; }
  if(hasWidgetStorage){
    try{ await window.storage.set(key, str); }
    catch(e){ console.error('storage error',e); }
    return;
  }
  try{ localStorage.setItem('hybridai:'+key, str); }
  catch(e){ console.error('storage error',e); }
}
async function listLogKeys(prefix){
  if(hasWidgetStorage){
    try{ const l = await window.storage.list(prefix); return l ? l.keys : []; }
    catch(e){ return []; }
  }
  try{
    return Object.keys(localStorage)
      .filter(k=>k.startsWith('hybridai:'+prefix))
      .map(k=>k.replace('hybridai:',''));
  }catch(e){ return []; }
}

async function loadAll(){
  const p = await safeGet('profile');
  STATE.profile = p ? JSON.parse(p) : null;
  const ev = await safeGet('events');
  STATE.events = ev ? JSON.parse(ev) : [];
  const gam = await safeGet('gamification');
  STATE.gamification = gam ? JSON.parse(gam) : {xp:0};
  const ct = await safeGet('customTargets');
  STATE.customTargets = ct ? JSON.parse(ct) : null;
  const th = await safeGet('theme');
  STATE.theme = th ? JSON.parse(th) : PRESETS.ember;
  const st = await safeGet('settings');
  STATE.settings = st ? {...{showQuotes:true}, ...JSON.parse(st)} : {showQuotes:true};
  let keys = await listLogKeys('logs:');
  STATE.logsByDate = {};
  for(const k of keys){
    const v = await safeGet(k);
    if(v){ STATE.logsByDate[k.replace('logs:','')] = JSON.parse(v); }
  }
  applyTheme(STATE.theme);
  STATE.loaded = true;
  render();
}

function applyTheme(th){
  const root = document.documentElement.style;
  root.setProperty('--bg', th.bg);
  root.setProperty('--surface', th.surface);
  root.setProperty('--accent', th.accent);
  root.setProperty('--accent2', th.accent2);
  root.setProperty('--accent3', th.accent3);
  root.setProperty('--accent4', th.accent4);
}

function getLog(date){
  if(!STATE.logsByDate[date]) STATE.logsByDate[date] = {food:[], training:[], water:0, sleep:null, weight:null};
  return STATE.logsByDate[date];
}
async function saveLog(date){ await safeSet('logs:'+date, STATE.logsByDate[date]); }
async function saveProfile(){ await safeSet('profile', STATE.profile); }
async function saveEvents(){ await safeSet('events', STATE.events); }
async function saveGamification(){ await safeSet('gamification', STATE.gamification); }
async function saveCustomTargets(){ await safeSet('customTargets', STATE.customTargets); }
async function saveTheme(){ await safeSet('theme', STATE.theme); }
async function saveSettings(){ await safeSet('settings', STATE.settings); }

function addXP(amount){ STATE.gamification.xp += amount; saveGamification(); }
function level(){ return Math.floor(STATE.gamification.xp/150)+1; }

function streakDays(){
  const dates = Object.keys(STATE.logsByDate).filter(d=>{
    const l = STATE.logsByDate[d];
    return (l.food&&l.food.length) || (l.training&&l.training.length);
  }).sort();
  if(!dates.length) return 0;
  let streak = 1;
  let cursor = new Date(dates[dates.length-1]);
  for(let i=dates.length-2;i>=0;i--){
    const prev = new Date(dates[i]);
    const diff = Math.round((cursor-prev)/86400000);
    if(diff===1){ streak++; cursor=prev; } else if(diff===0){ continue; } else break;
  }
  return streak;
}

function activityFactor(a){
  return {sedentario:1.2, ligero:1.375, moderado:1.55, alto:1.725, muyalto:1.9}[a] || 1.375;
}
function autoTargets(){
  const p = STATE.profile;
  if(!p) return DEFAULT_TARGETS;
  let bmr = p.sex==='M'
    ? 10*p.weight + 6.25*p.height - 5*p.age + 5
    : 10*p.weight + 6.25*p.height - 5*p.age - 161;
  let tdee = bmr * activityFactor(p.activity);
  let goalAdj = {bajar:-0.15, mantener:0, subir:0.12}[p.goal] || 0;
  let calories = tdee * (1+goalAdj);
  let proteinPerKg = p.sport==='fuerza' ? 2.2 : (p.sport==='hibrido' ? 2.0 : 1.8);
  let protein = proteinPerKg * p.weight;
  let fat = (calories*0.25)/9;
  let carbsCal = calories - (protein*4) - (fat*9);
  let carbs = Math.max(carbsCal/4, 0);
  let sodium = (p.sport==='resistencia' || p.sport==='hibrido') ? 3800 : 3000;
  let sugar = (calories*0.09)/4;
  let water = Math.round((p.weight*35 + 500));
  return {
    calories: Math.round(calories), protein: Math.round(protein), carbs: Math.round(carbs),
    fat: Math.round(fat), sodium: Math.round(sodium), sugar: Math.round(sugar), water: water
  };
}
function targets(){
  const auto = autoTargets();
  if(STATE.customTargets){ return {...auto, ...STATE.customTargets}; }
  return auto;
}
function macrosForDate(date){
  const log = STATE.logsByDate[date] || {food:[]};
  const sum = {calories:0,protein:0,carbs:0,fat:0,sodium:0,sugar:0};
  (log.food||[]).forEach(f=>{
    sum.calories += Number(f.calories)||0;
    sum.protein += Number(f.protein)||0;
    sum.carbs += Number(f.carbs)||0;
    sum.fat += Number(f.fat)||0;
    sum.sodium += Number(f.sodium)||0;
    sum.sugar += Number(f.sugar)||0;
  });
  return sum;
}
function hybridScore(date){
  const log = getLog(date);
  const t = targets();
  const m = macrosForDate(date);
  let score = 0;
  if(t.calories>0){ const dev = Math.abs(m.calories-t.calories)/t.calories; score += Math.max(0,1-dev*2)*25; }
  if(t.protein>0){ score += Math.min(m.protein/t.protein,1)*25; }
  if(t.water>0){ score += Math.min((log.water||0)/t.water,1)*20; }
  if(log.sleep){ score += Math.min(log.sleep/8,1)*15; }
  score += ((log.training||[]).length>0 ? 15 : 0);
  return Math.round(score);
}
function dailyQuote(){
  const d = new Date();
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(),0,0))/86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }

function render(){
  const app = document.getElementById('app');
  if(!STATE.loaded){ app.innerHTML = '<p class="empty">Cargando HybridAI...</p>'; return; }
  app.innerHTML = '';
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  const body = document.createElement('div');
  body.id = 'tabbody';
  app.appendChild(body);
  renderTabBody();
}

function renderHeader(){
  const lvl = level();
  return el(`
    <header class="top">
      <div class="brand">
        <div class="mark">HX</div>
        <div>
          <h1>HybridAI</h1>
          <p>Sistema operativo para atletas híbridos</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="level-chip">NIVEL ${lvl} · 🔥${streakDays()}d</div>
        <button class="ghost" id="waShareBtn">📲 WhatsApp</button>
      </div>
    </header>
  `);
}

function renderTabs(){
  const tabs = [
    ['dashboard','📊 Dashboard'],
    ['nutricion','🍽 Nutrición'],
    ['entrenamiento','🏃 Entrenamiento'],
    ['calendario','📅 Calendario'],
    ['progreso','📈 Progreso'],
    ['perfil','⚙️ Ajustes'],
  ];
  const nav = document.createElement('nav');
  nav.className = 'tabs';
  tabs.forEach(([id,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    if(STATE.tab===id) b.className='active';
    b.onclick = ()=>{ STATE.tab=id; render(); };
    nav.appendChild(b);
  });
  return nav;
}

function wireHeaderActions(){
  const btn = document.getElementById('waShareBtn');
  if(btn) btn.onclick = ()=>{
    const url = window.location.href;
    const msg = 'Estoy usando HybridAI para mi entrenamiento y nutrición. Abrilo aquí: ' + url;
    window.open('https://wa.me/?text='+encodeURIComponent(msg), '_blank');
  };
}

function renderTabBody(){
  const body = document.getElementById('tabbody');
  body.innerHTML = '';
  wireHeaderActions();
  if(!STATE.profile && STATE.tab!=='perfil'){
    body.appendChild(el(`<div class="card"><h3>Primero, tu perfil</h3><p class="note">Para calcular tus objetivos de calorías, macros e hidratación necesito algunos datos básicos. Ve a la pestaña ⚙️ Ajustes para comenzar. No voy a inventar estos datos.</p></div>`));
    return;
  }
  if(STATE.tab==='dashboard') return renderDashboard(body);
  if(STATE.tab==='nutricion') return renderNutricion(body);
  if(STATE.tab==='entrenamiento') return renderEntrenamiento(body);
  if(STATE.tab==='calendario') return renderCalendario(body);
  if(STATE.tab==='progreso') return renderProgreso(body);
  if(STATE.tab==='perfil') return renderPerfil(body);
}

function bar(name,val,target,color,unit){
  const pct = target>0 ? Math.min((val/target)*100,100) : 0;
  return `<div class="bar-row">
    <div class="top"><span class="name">${name}</span><span class="vals">${fmt1(val)}${unit||''} / ${fmt1(target)}${unit||''}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function nextEvent(){
  const today = todayStr();
  const upcoming = STATE.events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  return upcoming[0] || null;
}

function renderDashboard(body){
  const date = todayStr();
  const log = getLog(date);
  const t = targets();
  const m = macrosForDate(date);
  const score = hybridScore(date);
  const ev = nextEvent();

  const scoreColor = score>=75?'var(--accent3)':score>=45?'var(--accent)':'var(--danger)';

  if(STATE.settings.showQuotes){
    const q = dailyQuote();
    body.appendChild(el(`<div class="quote-card"><div class="q">${q.t}</div><div class="src">${q.s}</div></div>`));
  }

  body.appendChild(el(`<div class="card">
    <h3>Hybrid Score de hoy</h3>
    <div class="score-wrap">
      <div class="score-num" style="color:${scoreColor}">${score}</div>
      <div>
        <div class="score-label">de 100 · Nivel ${level()} · Racha ${streakDays()} días</div>

function buildRecommendation(m,t,log){
  const issues = [];
  if(t.protein>0 && m.protein < t.protein*0.7) issues.push('tu proteína está baja hoy — considera agregar una porción de 25-30g (pollo, huevo, proteína en polvo) para apoyar la recuperación muscular');
  if(t.sugar>0 && m.sugar > t.sugar*1.3) issues.push('el azúcar ya superó tu límite recomendado — prioriza carbohidratos complejos en la próxima comida');
  if(t.water>0 && (log.water||0) < t.water*0.4) issues.push('vas muy atrasado en hidratación — te recomiendo 500ml ahora y otro medio litro en la próxima hora');
  if(!log.sleep) issues.push('aún no registraste tu sueño de anoche; el sueño es clave para la recuperación y el rendimiento');
  if((log.training||[]).length===0) issues.push('no has registrado entrenamiento hoy — si ya entrenaste, regístralo para que ajuste tus calorías y recuperación');
  if(issues.length===0) return 'Vas muy bien hoy: tus macros e hidratación están dentro de rango. Mantén el ritmo y prioriza dormir 7-9 horas para consolidar la recuperación.';
  return issues[0].charAt(0).toUpperCase()+issues[0].slice(1)+'.';
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function analyzePhoto(file, statusEl, resultBox){
  statusEl.textContent = 'Analizando foto con IA...';
  try{
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';
    let data;
    if(AI_PROXY_URL){
      // Standalone hosting: send only the image to our own Worker, which holds the
      // real Anthropic API key server-side and builds the request itself.
      const resp = await fetch(AI_PROXY_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ image: base64, media_type: mediaType })
      });
      if(!resp.ok){ statusEl.textContent = 'El servicio de análisis no respondió (código '+resp.status+'). Intenta de nuevo o ingresa los datos manualmente.'; return; }
      data = await resp.json();
    } else {
      // Running inside a Claude.ai chat/artifact: this call is handled automatically, no key needed here.
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          messages:[{
            role:'user',
            content:[
              {type:'image', source:{type:'base64', media_type:mediaType, data:base64}},
              {type:'text', text:'Eres el módulo de análisis de comidas de HybridAI. Observa la foto y detecta los alimentos visibles, estima las cantidades (porciones/gramos) y calcula el total aproximado de macros. Responde SOLO con JSON válido, sin texto adicional, sin markdown, con esta forma exacta: {"foods":[{"name":"string","qty":"string"}],"confidence":"alta"|"media"|"baja","totals":{"calories":number,"protein":number,"carbs":number,"fat":number,"sodium":number,"sugar":number},"notes":"string breve"}'}
            ]
          }]
        })
      });
      data = await resp.json();
    }
    const textBlock = (data.content||[]).find(c=>c.type==='text');
    if(!textBlock){ statusEl.textContent = 'No se pudo analizar la foto. Intenta de nuevo o ingresa los datos manualmente.'; return; }
    let clean = textBlock.text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    STATE.photoDraft = parsed;
    statusEl.textContent = '';
    renderPhotoResult(parsed, resultBox);
  }catch(e){
    console.error(e);
    statusEl.textContent = 'Hubo un error analizando la foto. Puedes registrar el alimento manualmente.';
  }
}

function parseMetaAIResponse(text){
  text = text || '';
  const grab = (re) => { const m = text.match(re); return m ? m[1].trim() : null; };
  const num = (re) => {
    const v = grab(re);
    if(!v) return null;
    const n = parseFloat(v.replace(',','.').replace(/[^\d.\-]/g,''));
    return isNaN(n) ? null : n;
  };
  return {
    name: grab(/aliment[oa]s?\s*:\s*(.+)/i),
    calories: num(/cal[oó]r[ií]as?\s*:\s*([\d.,]+)/i),
    protein: num(/prote[ií]nas?\s*:\s*([\d.,]+)/i),
    carbs: num(/carbohidratos?\s*:\s*([\d.,]+)/i),
    fat: num(/grasas?\s*:\s*([\d.,]+)/i),
    sodium: num(/sodio\s*:\s*([\d.,]+)/i),
    sugar: num(/az[uú]car\s*:\s*([\d.,]+)/i),
    confidence: grab(/confianza\s*:\s*(\w+)/i),
  };
}

let gpsSession = null;

function haversineKm(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  const h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function formatDuration(sec){
  sec=Math.max(0,Math.floor(sec));
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  const mm=String(m).padStart(2,'0'), ss=String(s).padStart(2,'0');
  return h>0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
}
const MET_TABLE = {Running:9.8, Trail:10, Ciclismo:7.5, Caminata:3.8, Natación:8.3};
function estimateActivityCalories(type, minutes){
  const met = MET_TABLE[type] || 6;
  const weight = (STATE.profile && STATE.profile.weight) || 70;
  return Math.round(met*3.5*weight/200*minutes);
}
async function connectHeartRateBLE(bpmEl, statusEl){
  if(!navigator.bluetooth){
    statusEl.textContent = 'Tu navegador no soporta Bluetooth Web (ej. Safari en iPhone). Puedes anotar el BPM manual al terminar.';
    return;
  }
  try{
    const device = await navigator.bluetooth.requestDevice({filters:[{services:['heart_rate']}]});
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    const characteristic = await service.getCharacteristic('heart_rate_measurement');
    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', (e)=>{
      const value = e.target.value;
      const flags = value.getUint8(0);
      const bpm = (flags & 0x1) ? value.getUint16(1, true) : value.getUint8(1);
      if(gpsSession){ gpsSession.bpmSamples.push(bpm); gpsSession.lastBpm = bpm; }
      if(bpmEl) bpmEl.textContent = bpm;
    });
    if(gpsSession) gpsSession.bleDevice = device;
    statusEl.textContent = '✔ Conectado: ' + (device.name || 'monitor de frecuencia cardíaca');
  }catch(e){
    statusEl.textContent = 'No se conectó (cancelaste el diálogo o no hay un monitor cerca).';
  }
}

      active:true, type:typeSelect.value, points:[], distanceKm:0,
      startTime:Date.now(), bpmSamples:[], lastBpm:null, wakeLock:null,
      watchId:null, tickHandle:null, onTick:updateStats, onPoint:updateMap,
    };
    startBtn.style.display='none';
    stopBtn.style.display='inline-block';
    typeSelect.disabled = true;
    statusEl.textContent = 'Buscando señal GPS...';
    if('wakeLock' in navigator){ try{ gpsSession.wakeLock = await navigator.wakeLock.request('screen'); }catch(e){} }

    gpsSession.watchId = navigator.geolocation.watchPosition((pos)=>{
      if(pos.coords.accuracy && pos.coords.accuracy>60) return;
      const pt = {lat:pos.coords.latitude, lng:pos.coords.longitude, t:Date.now()};
      const pts = gpsSession.points;
      if(pts.length){
        const last = pts[pts.length-1];
        const km = haversineKm(last, pt);
        const hrs = (pt.t-last.t)/3600000;
        const speedKmh = hrs>0 ? km/hrs : 0;
        if(speedKmh > 70) return;
        gpsSession.distanceKm += km;
      } else {
        statusEl.textContent = '';
      }
      pts.push(pt);
      if(pts.length>3000) pts.splice(0, pts.length-3000);
      if(gpsSession.onPoint){ try{ gpsSession.onPoint(pt); }catch(e){} }
    }, ()=>{
      statusEl.textContent = 'No se pudo obtener tu ubicación — revisa el permiso de ubicación del navegador.';
    }, {enableHighAccuracy:true, maximumAge:2000, timeout:15000});

    gpsSession.tickHandle = setInterval(()=>{ if(gpsSession && gpsSession.onTick){ try{ gpsSession.onTick(); }catch(e){} } }, 1000);
  };

  stopBtn.onclick = async ()=>{
    if(!gpsSession) return;
    navigator.geolocation.clearWatch(gpsSession.watchId);
    clearInterval(gpsSession.tickHandle);
    if(gpsSession.wakeLock){ try{ await gpsSession.wakeLock.release(); }catch(e){} }
    if(gpsSession.bleDevice && gpsSession.bleDevice.gatt.connected){ try{ gpsSession.bleDevice.gatt.disconnect(); }catch(e){} }

    const elapsedMin = (Date.now()-gpsSession.startTime)/60000;
    const avgBpm = gpsSession.bpmSamples.length ? Math.round(gpsSession.bpmSamples.reduce((a,b)=>a+b,0)/gpsSession.bpmSamples.length) : null;
    const item = {
      type: gpsSession.type,
      duration: Math.round(elapsedMin),
      intensity: 6,
      calBurn: estimateActivityCalories(gpsSession.type, elapsedMin),
      notes: gpsSession.type+' con GPS',
      distanceKm: Math.round(gpsSession.distanceKm*100)/100,
      avgBpm,
      route: gpsSession.points.map(p=>({lat:p.lat,lng:p.lng})),
    };
    log.training.push(item);
    await saveLog(date);
    addXP(15);
    gpsSession = null;
    render();
  };

  return card;
}

function showRoutePreview(container, route){
  container.innerHTML = '<div class="gps-map mini-map" id="miniMapTmp"></div>';
  const div = container.querySelector('#miniMapTmp');
  const map = L.map(div,{zoomControl:false,dragging:true,scrollWheelZoom:false}).setView([route[0].lat,route[0].lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  const latlngs = route.map(p=>[p.lat,p.lng]);
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#F4A340';
  const poly = L.polyline(latlngs,{color:accentColor,weight:4}).addTo(map);
  map.fitBounds(poly.getBounds(),{padding:[20,20]});
}

function drawLineChart(canvasId, points){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.clientWidth;
  const h = canvas.height = 160;
  ctx.clearRect(0,0,w,h);
  const vals = points.map(p=>p.v);
  const min = Math.min(...vals)-0.5, max = Math.max(...vals)+0.5;
  const pad = 24;
  const xStep = (w-pad*2)/(points.length-1);
  const lineColor = getComputedStyle(document.documentElement).getPropertyValue('--line').trim();
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.strokeStyle = lineColor;
  ctx.beginPath();
  for(let i=0;i<=4;i++){ const y = pad + (h-pad*2)*i/4; ctx.moveTo(pad,y); ctx.lineTo(w-pad,y); }
  ctx.stroke();
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p,i)=>{
    const x = pad + xStep*i;
    const y = h-pad - ((p.v-min)/(max-min))*(h-pad*2);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle = accentColor;
  points.forEach((p,i)=>{
    const x = pad + xStep*i;
    const y = h-pad - ((p.v-min)/(max-min))*(h-pad*2);
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  });
}

// Voice commands
let recognizing = false;
function setupVoice(){
  const fab = document.getElementById('micFab');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    fab.onclick = ()=> alert('El reconocimiento de voz no está disponible en este navegador. Prueba con Chrome.');
    return;
  }
  const rec = new SR();
  rec.lang = 'es-ES';
  rec.continuous = false;
  rec.interimResults = false;

  fab.onclick = ()=>{
    if(recognizing){ rec.stop(); return; }
    try{ rec.start(); }catch(e){}
  };
  rec.onstart = ()=>{ recognizing = true; fab.classList.add('listening'); };
  rec.onend = ()=>{ recognizing = false; fab.classList.remove('listening'); };
  rec.onerror = ()=>{ recognizing = false; fab.classList.remove('listening'); };
  rec.onresult = (e)=>{
    const said = e.results[0][0].transcript.toLowerCase();
    showVoiceToast('Escuché: "'+said+'"');
    const map = [
      [/nutrici|comida/, 'nutricion'],
      [/entrena/, 'entrenamiento'],
      [/calendario|evento/, 'calendario'],
      [/progreso|peso/, 'progreso'],
      [/ajuste|perfil|configuraci/, 'perfil'],
      [/dashboard|inicio|resumen|hybrid ?ai/, 'dashboard'],
    ];
    for(const [re,tab] of map){
      if(re.test(said)){ STATE.tab = tab; render(); return; }
    }
  };
}
function showVoiceToast(msg){
  let t = document.querySelector('.voice-toast');
  if(t) t.remove();
  t = el(`<div class="voice-toast">${msg}</div>`);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

loadAll();
setupVoice();
</script>
